server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理到后端 API
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";          # SSE 需要
        proxy_buffering off;                     # SSE 需要关闭缓冲
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
